[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: hash routes only, but a refresh on a deep path shouldn't 404.
# All unknown paths serve index.html (client router handles it).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
